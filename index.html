<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="今天吃什么？问问天意。一个带有中原饮食文化气息的数字签筒。">
<title>吃啥嘞 — 问问天意</title>
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22&gt;&lt;text y=%22.9em%22 font-size=%2290%22&gt;🍜&lt;/text&gt;&lt;/svg&gt;">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:       #F6F1E9;
  --paper-dark:  #E8DFD0;
  --card:        #FDFAF5;
  --ink:         #23201B;
  --ink-mid:     #6B6055;
  --ink-light:   #A89F94;
  --lacquer:     #B85438;
  --lacquer-lt:  #E8C4AE;
  --lacquer-dim: #8A3D27;
}

html { min-height: 100vh; background: var(--paper); color: var(--ink); }

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 24px 140px;
  position: relative;
  overflow-x: hidden;
  background-image: radial-gradient(circle, #CBC0AE 1px, transparent 1px);
  background-size: 28px 28px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 38%, var(--paper) 0%, transparent 100%);
  opacity: 0.65;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 24px; }

.mark {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 12px;
}
.mark-line { width: 32px; height: 1px; background: var(--lacquer); opacity: 0.65; }
.mark-dot  { width: 6px; height: 6px; border: 1.5px solid var(--lacquer); border-radius: 50%; opacity: 0.75; }

h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 800;
  color: var(--ink);
  letter-spacing: 0.14em;
  line-height: 1;
}

/* ── Result card ── */
.result-wrap { width: 100%; margin-bottom: 16px; }

.result-card {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  position: relative;
  padding: 24px 20px 20px;
  text-align: center;
}

.result-card::before, .result-card::after,
.corner-tr, .corner-bl {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--lacquer);
  border-style: solid;
  opacity: 0.5;
}
.result-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.result-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

.result-label {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.3em;
  margin-bottom: 10px;
  font-weight: 300;
}

.result-food {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.6rem, 9vw, 4.4rem);
  font-weight: 600;
  color: var(--lacquer-dim);
  letter-spacing: 0.1em;
  min-height: 1.4em;
  display: flex;
  align-items: center;
  justify-content: center;
}

.result-card.spinning .result-food {
  animation: text-flicker 0.14s steps(1) infinite;
}

@keyframes text-flicker {
  0%   { color: var(--lacquer-dim); }
  40%  { color: var(--ink-mid); }
  70%  { color: var(--lacquer); }
  100% { color: var(--lacquer-dim); }
}

/* Scan-line sweep */
.result-card { overflow: hidden; }

.card-fx {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.result-card.spinning .card-fx::after {
  content: '';
  position: absolute;
  left: -10%; right: -10%;
  height: 45%;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(184,84,56,0.07) 40%,
    rgba(184,84,56,0.11) 50%,
    rgba(184,84,56,0.07) 60%,
    transparent 100%
  );
  animation: scan-sweep 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes scan-sweep {
  0%   { top: -50%; }
  100% { top: 130%; }
}

/* Corner brackets pulse while spinning */
@keyframes corner-pulse {
  0%   { opacity: 0.3; width: 13px; height: 13px; }
  100% { opacity: 1;   width: 22px; height: 22px; }
}

.result-card.spinning::before { animation: corner-pulse 0.4s ease-in-out infinite alternate; }
.result-card.spinning::after  { animation: corner-pulse 0.4s 0.1s ease-in-out infinite alternate; }
.result-card.spinning .corner-tr { animation: corner-pulse 0.4s 0.05s ease-in-out infinite alternate; }
.result-card.spinning .corner-bl { animation: corner-pulse 0.4s 0.15s ease-in-out infinite alternate; }

/* Border tint while spinning */
.result-card.spinning { border-color: var(--lacquer-lt); }

.sign-number {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  opacity: 0;
  transition: opacity 0.5s ease 0.6s;
}
.sign-number.visible {
  opacity: 0.45;
}

.result-food.landing {
  animation: stamp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

.result-tip {
  margin-top: 8px;
  min-height: 2.2em;
  opacity: 0;
  transition: opacity 0.5s ease 0.4s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
  line-height: 1.5;
}
.result-tip.visible {
  opacity: 1;
}
.result-tip .tip-main {
  font-size: 12px;
  color: var(--ink-mid);
  letter-spacing: 0.06em;
}
.result-tip .tip-sub {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.06em;
}

@keyframes stamp {
  0%   { transform: scale(1.1); opacity: 0; filter: blur(3px); }
  55%  { filter: blur(0); }
  100% { transform: scale(1);   opacity: 1; }
}

/* ── Button ── */
.btn-wrap { margin-bottom: 24px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--lacquer);
  color: #FDF8F2;
  border: none;
  padding: 14px 44px;
  font-size: 15px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 400;
  letter-spacing: 0.18em;
  cursor: pointer;
  box-shadow: 3px 3px 0 rgba(139,61,39,0.22);
  transition: background 0.2s, transform 0.12s, box-shadow 0.12s;
}

.btn:hover  { background: var(--lacquer-dim); transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(139,61,39,0.22); }
.btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(139,61,39,0.18); }

/* Stop state */
.btn.is-spinning {
  background: var(--ink);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.18);
  letter-spacing: 0.22em;
  animation: btn-pulse 0.7s ease-in-out infinite alternate;
}
.btn.is-spinning:hover { background: #3a352e; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(0,0,0,0.18); }

@keyframes btn-pulse {
  0%   { box-shadow: 3px 3px 0 rgba(0,0,0,0.18); }
  100% { box-shadow: 3px 3px 0 rgba(0,0,0,0.18), 0 0 0 4px rgba(35,32,27,0.08); }
}

.btn-rule { width: 1px; height: 14px; background: rgba(255,255,255,0.35); }

.btn-kanji {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 400;
  opacity: 0.88;
  display: inline-block;
  transition: transform 0.55s ease;
}
.btn:not(.is-spinning):hover .btn-kanji { transform: rotate(90deg); }
.btn.is-spinning .btn-kanji { animation: kanji-spin 0.6s linear infinite; }

@keyframes kanji-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Divider ── */
.divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  color: var(--ink-light);
  font-size: 11px;
  letter-spacing: 0.22em;
  font-weight: 300;
}
.divider::before { content: ''; flex: 0 0 24px; height: 1px; background: var(--paper-dark); }
.divider::after  { content: ''; flex: 1;        height: 1px; background: var(--paper-dark); }
.divider > span  { white-space: nowrap; }

.pool-tabs {
  display: flex;
  gap: 18px;
  align-items: center;
}
.pool-tab {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  cursor: pointer;
  padding-bottom: 2px;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  user-select: none;
}
.pool-tab:hover { color: var(--ink-mid); }
.pool-tab.active {
  color: var(--lacquer);
  border-bottom-color: var(--lacquer);
}

.add-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--paper-dark);
  padding: 2px 6px 2px 4px;
  font-size: 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  color: var(--ink);
  outline: none;
  width: 96px;
  letter-spacing: 0.06em;
  transition: border-color 0.2s;
}
.add-input::placeholder { color: var(--ink-light); }
.add-input:focus { border-color: var(--lacquer); }

.add-btn {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 2px 10px;
  font-size: 15px;
  color: var(--ink-mid);
  cursor: pointer;
  line-height: 1.5;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn:hover { border-color: var(--lacquer); color: var(--lacquer); }

/* ── Food tags ── */
.particle-container,
.slot-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 48vh;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
}
.menu-grid-container {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 48vh;
  z-index: 0;
  pointer-events: auto;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 24px;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 10px 12px;
  mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
}
.menu-grid-item {
  padding: 6px 14px;
  font-size: 12.5px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--ink-mid);
  border: 1px solid var(--paper-dark);
  background: var(--card);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  letter-spacing: 0.04em;
  user-select: none;
}
.menu-grid-item:hover {
  border-color: var(--lacquer);
  color: var(--lacquer);
}
.menu-grid-item:active {
  transform: scale(0.96);
}
.slot-column {
  width: 110px;
  height: 100%;
  overflow: hidden;
  position: relative;
  mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
}
.slot-strip {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  will-change: transform;
}
.slot-item {
  height: 44px;
  line-height: 44px;
  text-align: center;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 12.5px;
  color: var(--ink-mid);
  opacity: 0.45;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  pointer-events: auto;
  cursor: pointer;
}
.slot-item.active {
  opacity: 1;
  color: var(--lacquer);
  font-size: 14px;
  font-weight: 600;
  transform: scale(1.07);
  text-shadow: 0 0 14px rgba(184,84,56,0.18);
  transition: all 0.35s cubic-bezier(0.22, 0.8, 0.3, 1);
}
.slot-item.in-my-menu {
  opacity: 0.9;
  color: var(--lacquer-dim);
}
.slot-item.in-my-menu::before {
  content: '·';
  display: inline-block;
  margin-right: 4px;
  color: var(--lacquer);
  font-weight: 800;
}

/* 横向贯穿的中心高亮条 */
.slot-container::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  transform: translateY(-50%);
  height: 44px;
  background: rgba(184, 84, 56, 0.04);
  border-top: 1px solid rgba(184, 84, 56, 0.07);
  border-bottom: 1px solid rgba(184, 84, 56, 0.07);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 1;
}
.slot-container.has-winner::after {
  opacity: 1;
}

.slot-empty {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  color: var(--ink-light);
  letter-spacing: 0.1em;
  text-align: center;
  white-space: nowrap;
}

/* 滚动时的动态模拟效果 */
.slot-column.spinning .slot-item {
  opacity: 0.2;
  filter: blur(0.8px);
  transform: scaleY(0.88);
  transition: opacity 0.1s, filter 0.1s, transform 0.1s;
}

/* ── Fortune slip ── */
.fortune-wrap {
  width: 100%;
  text-align: center;
  margin-top: 0;
  margin-bottom: 0;
  max-height: 0;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.6s ease 0.3s, margin 0.4s ease;
}
.fortune-wrap.visible {
  max-height: 50px;
  min-height: 36px;
  margin-top: -4px;
  margin-bottom: 4px;
  opacity: 1;
}

.fortune-text {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 12.5px;
  font-weight: 400;
  color: var(--ink-light);
  letter-spacing: 0.18em;
  line-height: 1.9;
}
.fortune-columns {
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: center;
}
.fc-col {
  writing-mode: vertical-rl;
  text-orientation: upright;
  letter-spacing: 0.22em;
  font-size: 13.5px;
  line-height: 1.4;
}

/* ── Share buttons ── */
.share-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.5s ease 0.5s, margin-bottom 0.4s ease;
}
.share-row.visible {
  max-height: 44px;
  margin-bottom: 16px;
  opacity: 1;
}

/* ── Cook / 做法 ── */
.cook-wrap {
  width: 100%;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.5s ease, opacity 0.5s ease 0.2s, margin 0.4s ease;
}
.cook-wrap.visible {
  max-height: none;
  margin-top: 8px;
  margin-bottom: 8px;
  opacity: 1;
}
.cook-content {
  font-size: 12.5px;
  color: var(--ink-mid);
  line-height: 1.8;
  letter-spacing: 0.04em;
  max-width: 100%;
  width: 100%;
  background: var(--card);
  border: 1px solid var(--paper-dark);
  padding: 24px 28px;
  position: relative;
}
.cook-content::before, .cook-content::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--lacquer);
  border-style: solid;
  opacity: 0.3;
}
.cook-content::before { top: -1px; left: -1px; border-width: 1.5px 0 0 1.5px; }
.cook-content::after  { bottom: -1px; right: -1px; border-width: 0 1.5px 1.5px 0; }

.cook-section { margin-bottom: 20px; }
.cook-section:last-child { margin-bottom: 0; }
.cook-section-title {
  font-size: 10.5px;
  color: var(--lacquer);
  letter-spacing: 0.22em;
  margin-bottom: 10px;
  font-weight: 600;
  text-transform: uppercase;
}
.cook-materials-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 20px;
}
.cook-material-item {
  font-size: 12px;
  display: flex;
  gap: 6px;
  align-items: baseline;
}
.cook-material-name { color: var(--ink); font-weight: 500; }
.cook-material-amount { color: var(--ink-light); font-size: 11px; }

.cook-step {
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--paper-dark);
}
.cook-step:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: none;
}
.cook-step-num {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  color: var(--lacquer);
  line-height: 1.2;
  flex-shrink: 0;
  min-width: 26px;
  text-align: center;
  opacity: 0.8;
}
.cook-step-body { flex: 1; }
.cook-step-title {
  font-size: 13px;
  color: var(--ink);
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}
.cook-step-desc {
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.7;
}
.cook-step-why {
  font-size: 11px;
  color: var(--ink-light);
  margin-top: 4px;
  font-style: italic;
  letter-spacing: 0.03em;
}
.cook-step-why::before { content: '→ '; color: var(--lacquer-lt); }
.cook-step-heat {
  font-size: 11px;
  color: var(--lacquer-dim);
  margin-top: 6px;
  letter-spacing: 0.05em;
  display: inline-block;
  padding: 2px 8px;
  background: var(--paper);
  border-radius: 2px;
}
.cook-tips-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cook-tips-item {
  font-size: 11.5px;
  color: var(--ink-mid);
  line-height: 1.7;
  padding-left: 16px;
  position: relative;
}
.cook-tips-item::before {
  content: '·';
  position: absolute;
  left: 2px;
  color: var(--lacquer);
  font-weight: 600;
}

.share-btn {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 6px 18px;
  font-size: 11px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  color: var(--ink-light);
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s ease;
}
.share-btn:hover {
  border-color: var(--lacquer);
  color: var(--lacquer);
}

/* ── Share overlay ── */
.share-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(35,32,27,0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  padding: 24px;
}
.share-overlay.active { display: flex; }

.share-preview {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  padding: 20px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  position: relative;
}
.share-preview img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 16px;
}
.share-hint {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.15em;
  font-weight: 300;
  margin-bottom: 12px;
}
.share-close {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 6px 24px;
  font-size: 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--ink-mid);
  cursor: pointer;
  letter-spacing: 0.12em;
  transition: all 0.15s;
}
.share-close:hover { border-color: var(--lacquer); color: var(--lacquer); }

.share-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(246, 241, 233, 0.85);
  border: 1px solid var(--paper-dark);
  color: var(--ink-mid);
  font-size: 16px;
  font-family: 'Shippori Mincho B1', serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  line-height: 1;
  padding-bottom: 2px;
  transition: all 0.15s;
}
.share-nav:hover {
  background: var(--card);
  border-color: var(--lacquer);

function defaultState() {
  return {
    version: STATE_VERSION,
    foods: [...DEFAULT_FOODS],
    myMenu: [],
    customTips: {},
    customRecipes: {},
    history: {
      recent: [],
      favorites: [],
      blacklist: [],
      todayFortune: null,
      todayPick: null,
      draws: []
    },
    settings: {
      sound: true
    }
  };
}

function migrateState(raw) {
  // v0 → v1: add version, restructure history
  if (!raw.version) {
    raw.version = 1;
    if (Array.isArray(raw.history)) {
      raw.history = { recent: raw.history };
    }
  }
  if (!raw.history) raw.history = {};
  if (!raw.history.recent) raw.history.recent = [];
  if (!raw.history.favorites) raw.history.favorites = [];
  if (!raw.history.blacklist) raw.history.blacklist = [];
  if (!('todayFortune' in raw.history)) raw.history.todayFortune = null;
  if (!('todayPick' in raw.history)) raw.history.todayPick = null;
  if (!raw.myMenu) raw.myMenu = [];
  if (!raw.customTips) raw.customTips = {};
  if (!raw.customRecipes) raw.customRecipes = {};
  if (!raw.history.draws) raw.history.draws = [];
  if (!raw.settings) raw.settings = { sound: true };

  return raw;
}

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw) return defaultState();
    return migrateState(raw);
  } catch {
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch { /* quota exceeded — silent */ }
}

const state = loadState();

// Convenience accessors
let currentPool = 'all'; // 'all' | 'myMenu'

function getFoods() {
  return currentPool === 'myMenu' ? state.myMenu : state.foods;
}

/* ═══════════════════════════════════════
   Sound System (Web Audio API)
   Audio: Woodblock #268822 (CC0) — kwahmah_02
   Audio: Wax seal #759526 (CC0) — Cerise_Virtuelle
   ═══════════════════════════════════════ */

let audioCtx = null;
let woodblockBuffer = null;
let stampBuffer = null;
let preloadPromise = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// Preload audio files into AudioBuffers
async function loadSoundFile(url) {
  try {
    const ctx = ensureAudioCtx();
    const res = await fetch(url);
    const arrayBuf = await res.arrayBuffer();
    return await ctx.decodeAudioData(arrayBuf);
  } catch {
    return null; // Graceful fallback: silent
  }
}

async function preloadSounds() {
  const ctx = ensureAudioCtx();
  [woodblockBuffer, stampBuffer] = await Promise.all([
    loadSoundFile('sounds/woodblock.wav'),
    loadSoundFile('sounds/stamp.wav')
  ]);
}

function ensurePreload() {
  if (!preloadPromise) {
    preloadPromise = preloadSounds();
  }
  return preloadPromise;
}

// Start preloading as early as possible (decodeAudioData works in suspended state)
ensurePreload();

// Unlock audio context on first user interaction (iOS Safari / WeChat requirement)
function unlockAudio() {
  const ctx = ensureAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

/**
 * Play a preloaded AudioBuffer
 */
function playBuffer(buffer) {
  if (!state.settings.sound || !buffer) return;
  const ctx = ensureAudioCtx();
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start(0);
}

/** Woodblock tap — start spinning */
function playWoodblock() {
  if (!state.settings.sound) return;
  if (woodblockBuffer) {
    playBuffer(woodblockBuffer);
    return;
  }
  // Buffer not ready yet, wait for preload then play
  ensurePreload().then(() => {
    if (state.settings.sound) playBuffer(woodblockBuffer);
  });
}

/** Wax seal stamp — result landing */
function playStamp() {
  if (!state.settings.sound) return;
  if (stampBuffer) {
    playBuffer(stampBuffer);
    return;
  }
  // Buffer not ready yet, wait for preload then play
  ensurePreload().then(() => {
    if (state.settings.sound) playBuffer(stampBuffer);
  });
}

}

let stormActive = false;
let stormTimer = 0;
let stormDecayStart = -1;

function initSlotMachine() {
  const container = document.getElementById('particle-container');
  container.innerHTML = '';

  const foods = getFoods();
  if (foods.length === 0) {
    container.innerHTML = '<div class="slot-empty">' +
      (currentPool === 'myMenu'
        ? '我的菜单是空的'
        : '暂无可选菜品') +
      '</div>';
    return;
  }

  // 我的菜单模式下显示简洁网格列表
  if (currentPool === 'myMenu') {
    container.className = 'menu-grid-container';
    foods.forEach((name, idx) => {
      const item = document.createElement('div');
      item.className = 'menu-grid-item';
      item.textContent = name;
      item.title = '单击删除';
      item.onclick = () => removeFood(idx);
      container.appendChild(item);
    });
    return;
  }

  container.className = 'slot-container';
  const columns = Math.min(5, Math.max(3, Math.floor(window.innerWidth / 130)));
  // 根据菜品数量动态调整重复次数，防止 DOM 过多导致卡顿
  const repeatCount = Math.min(8, Math.max(3, Math.floor(600 / foods.length)));

  for (let i = 0; i < columns; i++) {
    const col = document.createElement('div');
    col.className = 'slot-column';
    const strip = document.createElement('div');
    strip.className = 'slot-strip';
    strip.dataset.col = i;
    strip.dataset.repeat = repeatCount;

    for (let r = 0; r < repeatCount; r++) {
      foods.forEach((name, idx) => {
        const item = document.createElement('div');
        item.className = 'slot-item';
        item.textContent = name;
        item.dataset.index = idx;
        item.title = '单击移出';
        item.onclick = (e) => { e.stopPropagation(); toggleFoodInPool(name); };
        strip.appendChild(item);
      });
    }

    col.appendChild(strip);
    container.appendChild(col);

    // 初始状态每列独立随机偏移，避免所有列同步显示
    const initialOffset = Math.floor(Math.random() * foods.length) * 44;
    strip.style.transform = `translateY(-${initialOffset}px)`;
  }
}

function toggleFoodInPool(name) {
  const foods = getFoods();
  const idx = foods.indexOf(name);
  if (idx >= 0) {
    if (foods.length <= 1) return;
    foods.splice(idx, 1);
  } else {
    foods.push(name);
  }
  saveState();
  renderSlotMachine();
}

function triggerSlotSpin(targetIndex) {
  stormActive = true;
  stormTimer = 0;
  stormDecayStart = -1;

  const foods = getFoods();
  const itemHeight = 44;
  const strips = document.querySelectorAll('.slot-strip');

  // 先重置到随机位置
  strips.forEach(strip => {
    const randomOffset = Math.floor(Math.random() * foods.length) * itemHeight;
    strip.style.transition = 'none';
    strip.style.transform = `translateY(-${randomOffset}px)`;
  });

  void document.body.offsetWidth;

  // 添加滚动动态效果
  document.querySelectorAll('.slot-column').forEach(col => col.classList.add('spinning'));

  // 计算最外侧列的总动画时间，用于结束后移除效果
  const maxDist = Math.floor(strips.length / 2);
  const maxDuration = 1.8 + maxDist * 0.35 + maxDist * 0.12;
  setTimeout(() => {
    document.querySelectorAll('.slot-column').forEach(col => col.classList.remove('spinning'));
  }, maxDuration * 1000 + 100);

  // 开始滚动
  const repeatCount = parseInt(strips[0]?.dataset.repeat || 8);
  const targetCycle = Math.floor(repeatCount / 2);
  strips.forEach((strip, i) => {
    const colHeight = strip.parentElement.offsetHeight;
    const centerOffset = colHeight / 2 - itemHeight / 2;
    const cycleHeight = foods.length * itemHeight;

    // 目标：让 targetIndex 出现在中间圈
    const baseY = -(targetCycle * cycleHeight + targetIndex * itemHeight) + centerOffset;

    // 额外滚动圈数（中间列少转，两侧多转）
    const mid = Math.floor(strips.length / 2);
    const distFromMid = Math.abs(i - mid);
    const extraRounds = distFromMid;
    const finalY = baseY - extraRounds * cycleHeight;

    const delay = distFromMid * 0.12;
    const duration = 1.8 + distFromMid * 0.35;

    strip.dataset.finalY = finalY;
    strip.style.transition = `transform ${duration}s cubic-bezier(0.22, 0.8, 0.3, 1) ${delay}s`;
    strip.style.transform = `translateY(${finalY}px)`;
  });
}

function updateSlotHighlight(index) {
  const itemHeight = 44;
  const strips = document.querySelectorAll('.slot-strip');
  document.querySelectorAll('.slot-item.active').forEach(item => item.classList.remove('active'));
  document.querySelector('.slot-container')?.classList.add('has-winner');

  strips.forEach(strip => {
    const finalY = parseFloat(strip.dataset.finalY || 0);
    const colHeight = strip.parentElement.offsetHeight;
    const centerOffset = colHeight / 2 - itemHeight / 2;
    const items = strip.querySelectorAll('.slot-item');
    let closestItem = null;
    let minDist = Infinity;

    items.forEach(item => {
      if (parseInt(item.dataset.index) !== index) return;
      const itemTop = item.offsetTop + finalY;
      const dist = Math.abs(itemTop - centerOffset);
      if (dist < minDist) {
        minDist = dist;
        closestItem = item;
      }
    });

    if (closestItem) closestItem.classList.add('active');
  });
}

function renderSlotMachine() {
  requestAnimationFrame(() => initSlotMachine());
}

function pick(index) {
  const el = document.getElementById('result');
  const tipEl = document.getElementById('result-tip');
  current = index;
  el.classList.remove('landing');
  void el.offsetWidth;
  el.classList.add('landing');
  el.textContent = getFoods()[index];
  const foodName = getFoods()[index];
  const tipText = FOOD_TIPS[foodName] || state.customTips[foodName] || '';
  tipEl.innerHTML = '<span class="tip-main">' + tipText + '</span>' +
    '<span class="tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
  tipEl.classList.add('visible');
  showSignNumber();
  showShareRow();

  // 触发风暴衰减：其他签开始慢慢减速恢复
  if (stormActive && stormDecayStart === -1) {
    stormDecayStart = stormTimer;
  }

  // 高亮老虎机中的选中项
  updateSlotHighlight(index);

  // 中签飞行：从老虎机中间列飞到结果卡片
  const strips = document.querySelectorAll('.slot-strip');
  const midCol = Math.floor(strips.length / 2);
  const midStrip = strips[midCol];
  if (midStrip) {
    const items = midStrip.querySelectorAll('.slot-item');
    const activeItem = Array.from(items).find(item => parseInt(item.dataset.index) === index);
    if (activeItem) {
      const rect = activeItem.getBoundingClientRect();
      const card = document.getElementById('result-card');
      const cardRect = card.getBoundingClientRect();

      const clone = activeItem.cloneNode(true);
      clone.style.position = 'fixed';
      clone.style.left = rect.left + 'px';
      clone.style.top = rect.top + 'px';
      clone.style.width = rect.width + 'px';
      clone.style.height = rect.height + 'px';
      clone.style.margin = '0';
      clone.style.zIndex = '200';
      clone.style.pointerEvents = 'none';
      clone.style.transition = 'all 0.18s cubic-bezier(0.08, 0.9, 0.15, 1)';
      document.body.appendChild(clone);

      void clone.offsetWidth;

      const targetX = cardRect.left + cardRect.width / 2;
      const targetY = cardRect.top + cardRect.height / 2;

      clone.style.left = targetX + 'px';
      clone.style.top = targetY + 'px';
      clone.style.transform = 'translate(-50%, -50%) scale(1.5)';
      clone.style.opacity = '0.1';

      setTimeout(() => clone.remove(), 550);
    }
  }

  // 切换菜品时 reset 做法区域
  document.getElementById('cook-wrap').classList.remove('visible');
  document.getElementById('cook-content').innerHTML = '';

  // 自定义菜如果没有描述，自动请求 LLM 并更新显示
  if (!tipText && !DEFAULT_FOODS.includes(foodName)) {
    fetchCookFor(foodName).then(() => {
      // 如果当前仍然显示这道菜，更新 tip
      if (document.getElementById('result').textContent === foodName) {
        const newTip = state.customTips[foodName];
        if (newTip) {
          tipEl.innerHTML = '<span class="tip-main">' + newTip + '</span>' +
            '<span class="tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
        }
      }
    });
  }
}

function removeFood(index) {
  const foods = getFoods();
  const dishName = foods[index];

  // 全部选项至少保留一道菜；我的菜单可以清空
  if (currentPool === 'all' && foods.length <= 1) return;

  // 从当前池中删除
  foods.splice(index, 1);

  if (current === index) {
    current = -1;
    const el = document.getElementById('result');
    const tipEl = document.getElementById('result-tip');
    el.classList.remove('landing');
    el.textContent = '待君问签';
    tipEl.classList.remove('visible');
    tipEl.textContent = '';
    hideSignNumber();
    document.getElementById('share-row').classList.remove('visible');
    document.getElementById('cook-wrap').classList.remove('visible');
  } else if (current > index) {
    current--;
  }
  renderSlotMachine();
  saveState();
}

function addFood() {
  const input = document.getElementById('add-input');
  const val = input.value.trim();
  if (!val) {
    input.style.borderColor = 'var(--lacquer)';
    setTimeout(() => { input.style.borderColor = ''; }, 400);
    return;
  }
  if (state.foods.includes(val) || state.myMenu.includes(val)) {
    input.value = '';
    input.style.borderColor = 'var(--lacquer)';
    setTimeout(() => { input.style.borderColor = ''; }, 400);
    return;
  }
  // 只添加到当前激活的池子
  if (currentPool === 'all') {
    state.foods.push(val);
  } else {
    state.myMenu.push(val);
  }
  input.value = '';
  renderSlotMachine();
  saveState();

  // 自定义菜（不在 DEFAULT_FOODS 中）自动请求 LLM 获取描述和做法
  if (!DEFAULT_FOODS.includes(val)) {
    fetchCookFor(val);
  }
}

async function fetchCookFor(dish) {
  // 异步获取 tip + recipe，不阻塞 UI
  try {
    const res = await fetch('/api/cook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dish })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.warn('fetchCookFor HTTP error:', res.status, errText.slice(0, 200));
      return;
    }
    const data = await res.json();
    if (data.error) {
      console.warn('fetchCookFor API error:', data.error, data.detail);
      return;
    }
    if (data.tip) {
      state.customTips[dish] = data.tip;
    }
    if (data.recipe) {
      state.customRecipes[dish] = data.recipe;
    }
    saveState();
    console.log('fetchCookFor success:', dish, 'tip=' + (data.tip || 'none'));

    // 如果当前页面正显示这道菜，自动更新 tip
    const resultEl = document.getElementById('result');
    const tipEl = document.getElementById('result-tip');
    if (resultEl && resultEl.textContent === dish && tipEl && tipEl.classList.contains('visible')) {
      const newTip = state.customTips[dish] || '';
      tipEl.innerHTML = '<span class="tip-main">' + newTip + '</span>' +
        '<span class="tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
    }
  } catch (e) {
    console.warn('fetchCookFor network error:', e.message);
  }
}

function switchPool(pool) {
  currentPool = pool;
  document.getElementById('tab-all').classList.toggle('active', pool === 'all');
  document.getElementById('tab-my').classList.toggle('active', pool === 'myMenu');
  // 切换后如果当前高亮的菜不在新池中，清除高亮
  const foods = getFoods();
  if (current !== -1 && (current >= foods.length || foods[current] !== document.getElementById('result').textContent)) {
    current = -1;
    const el = document.getElementById('result');
    const tipEl = document.getElementById('result-tip');
    el.classList.remove('landing');
    el.textContent = '待君问签';
    tipEl.classList.remove('visible');
    tipEl.textContent = '';
    hideSignNumber();
    document.getElementById('share-row').classList.remove('visible');
    document.getElementById('cook-wrap').classList.remove('visible');
  }
  renderSlotMachine();
}

function toggleMyMenu(name) {
  const idx = state.myMenu.indexOf(name);
  if (idx >= 0) {
    state.myMenu.splice(idx, 1);
  } else {
    state.myMenu.push(name);
  }
  saveState();
  renderSlotMachine();
}

function clearMyMenu() {

  saveState();
  renderSlotMachine();
}

function renderCategoryList() {
  const list = document.getElementById('category-list');
  list.innerHTML = FOOD_CATEGORIES.map((cat, i) => {
    const alreadyInPool = cat.items.filter(n => state.foods.includes(n)).length;
    const isFull = alreadyInPool === cat.items.length;
    const actionText = isFull ? '已全加入' : (alreadyInPool > 0 ? '追加 +' + (cat.items.length - alreadyInPool) : '加入 +' + cat.items.length);
    return '<div class="category-row' + (isFull ? ' added' : '') + '" onclick="toggleCategoryToMyMenu(' + i + ')">' +
      '<span class="category-row-name">' + cat.name + '</span>' +
      '<span class="category-row-meta">' +
        '<span class="category-row-count">' + cat.items.length + ' 道</span>' +
        '<span class="category-row-action">' + actionText + '</span>' +
      '</span>' +
    '</div>';
  }).join('');
}

function toggleCategoryToMyMenu(index) {
  const cat = FOOD_CATEGORIES[index];
  if (!cat) return;
  let added = 0;
  cat.items.forEach(name => {
    if (!state.foods.includes(name)) {
      state.foods.push(name);
      added++;
    }
  });
  saveState();
  renderSlotMachine();
  renderCategoryList();
  if (added > 0) showToast('「' + cat.name + '」已加入 ' + added + ' 道菜到全部选项');
}

let spinInterval = null;
let isSpinning = false;
let lastShown = 0;

function setSpinState(on) {
  isSpinning = on;
  const btn = document.getElementById('btn');
  const card = document.getElementById('result-card');
  const label = btn.querySelector('.btn-label');
  const kanji = btn.querySelector('.btn-kanji');
  if (on) {
    btn.classList.add('is-spinning');
    card.classList.add('spinning');
    label.textContent = '就这个了';
    kanji.textContent = '止';
  } else {
    btn.classList.remove('is-spinning');
    card.classList.remove('spinning');
    label.textContent = '问问天意';
    kanji.textContent = '签';
  }
}

function addToRecent(foodName) {
  const recent = state.history.recent;
  // Avoid consecutive duplicates
  if (recent.length > 0 && recent[0].name === foodName) return;
  recent.unshift({ name: foodName, date: new Date().toISOString().slice(0, 10) });
  // FIFO cap at 30
  if (recent.length > 30) recent.length = 30;
}

function addDraw(foodName) {
  const fortune = getDailyFortune();
  const draws = state.history.draws;
  const now = new Date();
  const signNum = getSignNumber();
  const draw = {
    name: foodName,
    date: now.toISOString().slice(0, 10),
    time: String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0'),
    signNumber: '第' + toChineseUpper(signNum) + '签',
    fortune: fortune.type === 'food' ? fortune.yi + ' · ' + fortune.ji : fortune.text,
    tip: FOOD_TIPS[foodName] || state.customTips[foodName] || ''
  };
  draws.unshift(draw);
  if (draws.length > 100) draws.length = 100;
}

function stopSpin() {
  if (!spinInterval) return;
  clearTimeout(spinInterval);
  spinInterval = null;
  setSpinState(false);
  // 快速平息风暴
  stormActive = false;
  playStamp();
  pick(lastShown);
  addToRecent(getFoods()[lastShown]);
  addDraw(getFoods()[lastShown]);
  saveState();
}

function spin() {
  if (isSpinning) { stopSpin(); return; }

  const foods = getFoods();
  const el = document.getElementById('result');
  let rounds = 0;
  const total = 14 + Math.floor(Math.random() * 5); // 14~18轮，更紧凑
  const targetIndex = Math.floor(Math.random() * foods.length);

  triggerSlotSpin(targetIndex);

  el.classList.remove('landing');
  document.getElementById('result-tip').classList.remove('visible');
  document.getElementById('share-row').classList.remove('visible');
  document.getElementById('cook-wrap').classList.remove('visible');
  document.querySelector('.slot-container')?.classList.remove('has-winner');
  setSpinState(true);
  playWoodblock();

  // Slow down over time
  function nextTick() {
    lastShown = Math.floor(Math.random() * foods.length);
    el.textContent = foods[lastShown];
    rounds++;

    if (rounds >= total) {
      spinInterval = null;
      setSpinState(false);
      playStamp();
      lastShown = targetIndex;
      el.textContent = foods[lastShown];
      pick(lastShown);
      addToRecent(foods[lastShown]);
      addDraw(foods[lastShown]);
      saveState();
      return;
    }

    // Speed: starts fast (50ms), decelerates from round 9 onward
    const delay = rounds < 9
      ? 50
      : 50 + (rounds - 9) * 18;
    spinInterval = setTimeout(nextTick, delay);
  }

  spinInterval = setTimeout(nextTick, 50);
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}

function getCurrentSolarTerm() {
  const month = new Date().getMonth() + 1;
  const day = new Date().getDate();
  const terms = [
    { name: '立春', m: 2, d: 4 }, { name: '雨水', m: 2, d: 19 },
    { name: '惊蛰', m: 3, d: 5 }, { name: '春分', m: 3, d: 20 },
    { name: '清明', m: 4, d: 4 }, { name: '谷雨', m: 4, d: 19 },
    { name: '立夏', m: 5, d: 5 }, { name: '小满', m: 5, d: 20 },
    { name: '芒种', m: 6, d: 5 }, { name: '夏至', m: 6, d: 21 },
    { name: '小暑', m: 7, d: 6 }, { name: '大暑', m: 7, d: 22 },
    { name: '立秋', m: 8, d: 7 }, { name: '处暑', m: 8, d: 23 },
    { name: '白露', m: 9, d: 7 }, { name: '秋分', m: 9, d: 22 },
    { name: '寒露', m: 10, d: 8 }, { name: '霜降', m: 10, d: 23 },
    { name: '立冬', m: 11, d: 7 }, { name: '小雪', m: 11, d: 22 },
    { name: '大雪', m: 12, d: 6 }, { name: '冬至', m: 12, d: 21 },
    { name: '小寒', m: 1, d: 5 }, { name: '大寒', m: 1, d: 20 }
  ];
  let current = terms[terms.length - 1];
  for (let i = 0; i < terms.length; i++) {
    const t = terms[i];
    if (month < t.m || (month === t.m && day < t.d)) {
      current = terms[i === 0 ? terms.length - 1 : i - 1];
      break;
    }
  }
  return current.name;
}

  ];
  return dates.some(t => t.m === month && t.d === day);
}

function getTimeTip() {
  const h = new Date().getHours();
  if (h >= 5 && h < 10) return '早餐宜温热';
  if (h >= 10 && h < 14) return '午餐要吃饱';
  if (h >= 14 && h < 17) return '下午适量补';
  if (h >= 17 && h < 20) return '晚餐宜清淡';
  if (h >= 20 && h < 24) return '夜宵不宜重';
  return '深夜少食';
}

function getTip(foodName) {
  // 优先从硬编码或自定义缓存获取食物描述
  const food = FOOD_TIPS[foodName] || state.customTips[foodName] || '';
  const time = getTimeTip();
  const solar = getSolarTip();
  const parts = [food, time, solar].filter(Boolean);
  return parts.join(' · ');
}

function getDailyFortune() {
  const today = new Date().toISOString().slice(0, 10);

  // 精确的节气日 → 显示对应节气签（横排）
  if (isSolarTermDay()) {
    const term = getCurrentSolarTerm();
    const solar = FORTUNES.find(f => f.type === 'solar' && f.text.startsWith(term));
    if (solar) return solar;
  }

  // 非节气日 → 从食签中按日期 hash 选取（竖排宜/忌）
  const foods = FORTUNES.filter(f => f.type === 'food');
  const seed = Math.abs(hashCode(today));
  return foods[seed % foods.length];
}

function toChineseUpper(n) {
  const cn = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖','拾'];
  if (n <= 10) return cn[n];
  if (n < 20) return '拾' + (n % 10 === 0 ? '' : cn[n % 10]);
  const tens = Math.floor(n / 10);
  const ones = n % 10;
  if (ones === 0) return cn[tens] + '拾';
  return cn[tens] + '拾' + cn[ones];
}

function getSignNumber() {
  // 基于食物名 + 当前时间戳的组合，每次点击签数不同但有根有据
  const food = getFoods()[lastShown] || '';
  const now = Date.now();
  const seed = Math.abs(hashCode(food + now));
  return (seed % 100) + 1;
}

async function shareFood() {
  const dish = document.getElementById('result').textContent;
  if (dish === '待君问签') return;

  const img1 = document.getElementById('share-img-1');
  const img2 = document.getElementById('share-img-2');
  const hint = document.getElementById('share-hint');
  const slider = document.getElementById('share-slider');
  img1.src = '';
  img2.src = '';
  hint.textContent = '生成中…';
  updateShareDots(0);
  showShareOverlay();

  // Prepare both cards
  prepareFortuneCard(dish);

  let recipe = state.customRecipes[dish] || getCookCache(dish);
  if (!recipe) recipe = getCookFallback(dish);
  prepareCookShareCard(dish, recipe);

  // Generate both images in parallel
  const [fortuneImg, cookImg] = await Promise.all([
    generateFortuneImage(),
    generateCookImage()
  ]);

  if (fortuneImg) {
    img1.src = fortuneImg;
    img2.src = cookImg || '';

    slider.scrollLeft = 0;

function getCookCache(dish) {
  try {
    const key = 'chisha-cook-' + encodeURIComponent(dish);
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { recipe, ts } = JSON.parse(raw);
    if (Date.now() - ts > 30 * 24 * 60 * 60 * 1000) return null;
    return recipe;
  } catch { return null; }
}

function setCookCache(dish, recipe) {
  const key = 'chisha-cook-' + encodeURIComponent(dish);
  localStorage.setItem(key, JSON.stringify({ recipe, ts: Date.now() }));
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toChineseNum(n) {
  const cn = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖','拾'];
  if (n <= 10) return cn[n];
  if (n < 20) return '拾' + (n % 10 === 0 ? '' : cn[n % 10]);
  const tens = Math.floor(n / 10);
  const ones = n % 10;
  if (ones === 0) return cn[tens] + '拾';
  return cn[tens] + '拾' + cn[ones];
}

function renderCook(recipe, container) {
  if (typeof recipe === 'string') {
    container.innerHTML = '<div style="white-space:pre-line;line-height:1.8;">' + escapeHtml(recipe) + '</div>';
    return;
  }

  let html = '';

  if (recipe.materials && recipe.materials.length) {
    html += '<div class="cook-section"><div class="cook-section-title">材料</div><div class="cook-materials-list">';
    recipe.materials.forEach(m => {
      html += '<div class="cook-material-item"><span class="cook-material-name">' + escapeHtml(m.name) + '</span><span class="cook-material-amount">' + escapeHtml(m.amount) + '</span></div>';
    });
    html += '</div></div>';
  }

  if (recipe.steps && recipe.steps.length) {
    html += '<div class="cook-section"><div class="cook-section-title">步骤</div>';
    recipe.steps.forEach((s, i) => {
      html += '<div class="cook-step">' +
        '<div class="cook-step-num">' + toChineseNum(i + 1) + '</div>' +
        '<div class="cook-step-body">' +
          '<div class="cook-step-title">' + escapeHtml(s.title) + '</div>' +
          '<div class="cook-step-desc">' + escapeHtml(s.desc) + '</div>' +
          (s.why ? '<div class="cook-step-why">' + escapeHtml(s.why) + '</div>' : '') +
          (s.heat ? '<div class="cook-step-heat">' + escapeHtml(s.heat) + '</div>' : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  if (recipe.tips && recipe.tips.length) {
    html += '<div class="cook-section"><div class="cook-section-title">小贴士</div><div class="cook-tips-list">';
    recipe.tips.forEach(t => {
      html += '<div class="cook-tips-item">' + escapeHtml(t) + '</div>';
    });
    html += '</div></div>';
  }

  container.innerHTML = html;
}

async function askCook() {
  const dish = document.getElementById('result').textContent;
  if (dish === '待君问签') return;

  const wrap = document.getElementById('cook-wrap');
  const content = document.getElementById('cook-content');
  const btn = document.getElementById('cook-btn');

  // 优先从 state.customRecipes 获取
  if (state.customRecipes[dish]) {
    renderCook(state.customRecipes[dish], content);
    wrap.classList.add('visible');
    return;
  }

  // 检查 localStorage 缓存
  const cached = getCookCache(dish);
  if (cached) {
    renderCook(cached, content);
    wrap.classList.add('visible');
    return;
  }

  // 加载状态
  btn.textContent = '生成中…';
  content.innerHTML = '<div class="cook-loading"><div class="cook-loading-dots"><span></span><span></span><span></span></div><div>正在生成做法</div></div>';
  wrap.classList.add('visible');

  try {
    const res = await fetch('/api/cook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dish })
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    // 保存 tip 和 recipe 到 state
    if (data.tip) {
      state.customTips[dish] = data.tip;
      // 更新当前显示的 tip
      const tipEl = document.getElementById('result-tip');
      if (tipEl.classList.contains('visible')) {
        tipEl.innerHTML = '<span class="tip-main">' + escapeHtml(data.tip) + '</span>' +
          '<span class="tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
      }
    }
    if (data.recipe) {
      state.customRecipes[dish] = data.recipe;
      renderCook(data.recipe, content);
      setCookCache(dish, data.recipe);
    }
    saveState();
  } catch (e) {
    renderCook(getCookFallback(dish), content);
  } finally {
    btn.textContent = '做法';
  }
}

/* ── 触摸滑动切换池子 ── */
let touchStartX = 0;
let touchStartY = 0;
const containerEl = document.querySelector('.container');
if (containerEl) {
  containerEl.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  containerEl.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
      switchPool(currentPool === 'all' ? 'myMenu' : 'all');
    }
  }, { passive: true });
}

// 窗口大小变化时重新渲染老虎机
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => renderSlotMachine(), 300);
});
