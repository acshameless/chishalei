<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="今天吃什么？问问天意。一个带有中原饮食文化气息的数字签筒。">
<title>吃啥嘞 — 问问天意</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:       #F6F1E9;
  --paper-dark:  #E8DFD0;
  --card:        #FDFAF5;
  --ink:         #23201B;
  --ink-mid:     #6B6055;
  --ink-light:   #A89F94;
  --lacquer:     #B85438;
  --lacquer-lt:  #E8C4AE;
  --lacquer-dim: #8A3D27;
}

html { min-height: 100vh; background: var(--paper); color: var(--ink); }

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 24px 96px;
  position: relative;
  overflow-x: hidden;
  background-image: radial-gradient(circle, #CBC0AE 1px, transparent 1px);
  background-size: 28px 28px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 38%, var(--paper) 0%, transparent 100%);
  opacity: 0.65;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 52px; }

.mark {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}
.mark-line { width: 32px; height: 1px; background: var(--lacquer); opacity: 0.65; }
.mark-dot  { width: 6px; height: 6px; border: 1.5px solid var(--lacquer); border-radius: 50%; opacity: 0.75; }

h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 800;
  color: var(--ink);
  letter-spacing: 0.14em;
  line-height: 1;
}

/* ── Result card ── */
.result-wrap { width: 100%; margin-bottom: 32px; }

.result-card {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  position: relative;
  padding: 40px 32px 36px;
  text-align: center;
}

.result-card::before, .result-card::after,
.corner-tr, .corner-bl {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--lacquer);
  border-style: solid;
  opacity: 0.5;
}
.result-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.result-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

.result-label {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.3em;
  margin-bottom: 20px;
  font-weight: 300;
}

.result-food {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.6rem, 9vw, 4.4rem);
  font-weight: 600;
  color: var(--lacquer-dim);
  letter-spacing: 0.1em;
  min-height: 1.4em;
  display: flex;
  align-items: center;
  justify-content: center;
}

.result-card.spinning .result-food {
  animation: text-flicker 0.14s steps(1) infinite;
}

@keyframes text-flicker {
  0%   { color: var(--lacquer-dim); }
  40%  { color: var(--ink-mid); }
  70%  { color: var(--lacquer); }
  100% { color: var(--lacquer-dim); }
}

/* Scan-line sweep */
.result-card { overflow: hidden; }

.card-fx {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.result-card.spinning .card-fx::after {
  content: '';
  position: absolute;
  left: -10%; right: -10%;
  height: 45%;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(184,84,56,0.07) 40%,
    rgba(184,84,56,0.11) 50%,
    rgba(184,84,56,0.07) 60%,
    transparent 100%
  );
  animation: scan-sweep 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes scan-sweep {
  0%   { top: -50%; }
  100% { top: 130%; }
}

/* Corner brackets pulse while spinning */
@keyframes corner-pulse {
  0%   { opacity: 0.3; width: 13px; height: 13px; }
  100% { opacity: 1;   width: 22px; height: 22px; }
}

.result-card.spinning::before { animation: corner-pulse 0.4s ease-in-out infinite alternate; }
.result-card.spinning::after  { animation: corner-pulse 0.4s 0.1s ease-in-out infinite alternate; }
.result-card.spinning .corner-tr { animation: corner-pulse 0.4s 0.05s ease-in-out infinite alternate; }
.result-card.spinning .corner-bl { animation: corner-pulse 0.4s 0.15s ease-in-out infinite alternate; }

/* Border tint while spinning */
.result-card.spinning { border-color: var(--lacquer-lt); }

.sign-number {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 10px;
  color: var(--ink-light);
  letter-spacing: 0.12em;
  opacity: 0;
  transition: opacity 0.5s ease 0.6s;
}
.sign-number.visible {
  opacity: 0.45;
}

.result-food.landing {
  animation: stamp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

.result-tip {
  margin-top: 10px;
  min-height: 2.8em;
  opacity: 0;
  transition: opacity 0.5s ease 0.4s;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
  line-height: 1.5;
}
.result-tip.visible {
  opacity: 1;
}
.result-tip .tip-main {
  font-size: 12px;
  color: var(--ink-mid);
  letter-spacing: 0.06em;
}
.result-tip .tip-sub {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.06em;
}

@keyframes stamp {
  0%   { transform: scale(1.1); opacity: 0; filter: blur(3px); }
  55%  { filter: blur(0); }
  100% { transform: scale(1);   opacity: 1; }
}

/* ── Button ── */
.btn-wrap { margin-bottom: 60px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--lacquer);
  color: #FDF8F2;
  border: none;
  padding: 14px 44px;
  font-size: 15px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 400;
  letter-spacing: 0.18em;
  cursor: pointer;
  box-shadow: 3px 3px 0 rgba(139,61,39,0.22);
  transition: background 0.2s, transform 0.12s, box-shadow 0.12s;
}

.btn:hover  { background: var(--lacquer-dim); transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(139,61,39,0.22); }
.btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(139,61,39,0.18); }

/* Stop state */
.btn.is-spinning {
  background: var(--ink);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.18);
  letter-spacing: 0.22em;
  animation: btn-pulse 0.7s ease-in-out infinite alternate;
}
.btn.is-spinning:hover { background: #3a352e; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(0,0,0,0.18); }

@keyframes btn-pulse {
  0%   { box-shadow: 3px 3px 0 rgba(0,0,0,0.18); }
  100% { box-shadow: 3px 3px 0 rgba(0,0,0,0.18), 0 0 0 4px rgba(35,32,27,0.08); }
}

.btn-rule { width: 1px; height: 14px; background: rgba(255,255,255,0.35); }

.btn-kanji {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 400;
  opacity: 0.88;
  display: inline-block;
  transition: transform 0.55s ease;
}
.btn:not(.is-spinning):hover .btn-kanji { transform: rotate(90deg); }
.btn.is-spinning .btn-kanji { animation: kanji-spin 0.6s linear infinite; }

@keyframes kanji-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Divider ── */
.divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  color: var(--ink-light);
  font-size: 11px;
  letter-spacing: 0.22em;
  font-weight: 300;
}
.divider::before { content: ''; flex: 0 0 24px; height: 1px; background: var(--paper-dark); }
.divider::after  { content: ''; flex: 1;        height: 1px; background: var(--paper-dark); }
.divider > span  { white-space: nowrap; }

.add-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--paper-dark);
  padding: 2px 6px 2px 4px;
  font-size: 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  color: var(--ink);
  outline: none;
  width: 96px;
  letter-spacing: 0.06em;
  transition: border-color 0.2s;
}
.add-input::placeholder { color: var(--ink-light); }
.add-input:focus { border-color: var(--lacquer); }

.add-btn {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 2px 10px;
  font-size: 15px;
  color: var(--ink-mid);
  cursor: pointer;
  line-height: 1.5;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn:hover { border-color: var(--lacquer); color: var(--lacquer); }

/* ── Food tags ── */
.foods-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  width: 100%;
}

.food-tag {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  padding: 6px 15px;
  font-size: 13.5px;
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.16s ease;
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 400;
  letter-spacing: 0.05em;
  user-select: none;
  display: inline-flex;
  align-items: center;
}

.food-tag:hover { background: var(--lacquer-lt); border-color: var(--lacquer-lt); color: var(--lacquer-dim); }
.food-tag.active { background: var(--lacquer); border-color: var(--lacquer); color: #FDF8F2; }

.food-tag.new-pop { animation: stamp 0.38s cubic-bezier(0.22,1,0.36,1); }

.del-btn {
  margin-left: 7px;
  font-size: 10px;
  color: inherit;
  opacity: 0;
  transition: opacity 0.15s;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
}
.food-tag:hover .del-btn { opacity: 0.45; }
.del-btn:hover { opacity: 1 !important; }

/* ── Fortune slip ── */
.fortune-wrap {
  width: 100%;
  text-align: center;
  margin-top: 0;
  margin-bottom: 0;
  max-height: 0;
  min-height: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.6s ease 0.3s, margin 0.4s ease;
}
.fortune-wrap.visible {
  max-height: 100px;
  min-height: 44px;
  margin-top: -8px;
  margin-bottom: 8px;
  opacity: 1;
}

.fortune-text {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 12.5px;
  font-weight: 400;
  color: var(--ink-light);
  letter-spacing: 0.18em;
  line-height: 1.9;
}
.fortune-columns {
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: center;
}
.fc-col {
  writing-mode: vertical-rl;
  text-orientation: upright;
  letter-spacing: 0.22em;
  font-size: 13.5px;
  line-height: 1.4;
}

/* ── Share buttons ── */
.share-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s ease, opacity 0.5s ease 0.5s, margin-bottom 0.4s ease;
}
.share-row.visible {
  max-height: 60px;
  margin-bottom: 48px;
  opacity: 1;
}

.share-btn {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 6px 18px;
  font-size: 11px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  color: var(--ink-light);
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.2s ease;
}
.share-btn:hover {
  border-color: var(--lacquer);
  color: var(--lacquer);
}

/* ── Share overlay ── */
.share-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(35,32,27,0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  padding: 24px;
}
.share-overlay.active { display: flex; }

.share-preview {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  padding: 20px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.share-preview img {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 16px;
}
.share-hint {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.15em;
  font-weight: 300;
  margin-bottom: 12px;
}
.share-close {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 6px 24px;
  font-size: 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  color: var(--ink-mid);
  cursor: pointer;
  letter-spacing: 0.12em;
  transition: all 0.15s;
}
.share-close:hover { border-color: var(--lacquer); color: var(--lacquer); }

/* ── Hidden share card (for html2canvas) ── */
.share-card-wrapper {
  position: absolute;
  left: 0;
  top: 0;
  width: 0;
  height: 0;
  overflow: hidden;
}
.share-card-hidden {
  width: 540px;
  min-height: 720px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #F6F1E9;
  background-image: radial-gradient(circle, #CBC0AE 0.8px, transparent 0.8px);
  background-size: 20px 20px;
  font-family: 'Shippori Mincho B1', serif;
  color: #23201B;
  padding: 48px;
  box-sizing: border-box;
}
.sc-label {
  font-size: 12px;
  color: #A89F94;
  letter-spacing: 0.35em;
  margin-bottom: 40px;
  font-weight: 300;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.sc-food {
  font-size: 56px;
  font-weight: 600;
  color: #8A3D27;
  letter-spacing: 0.12em;
  line-height: 1.3;
}
.sc-fortune {
  font-size: 14px;
  color: #6B6055;
  letter-spacing: 0.06em;
  line-height: 1.6;
  margin-top: 10px;
  margin-bottom: 56px;
  text-align: center;
}
.sc-fortune .sc-tip-sub {
  display: block;
  font-size: 12px;
  color: #A89F94;
  letter-spacing: 0.06em;
}
.sc-divider {
  width: 32px;
  height: 1px;
  background: #E8DFD0;
  margin-bottom: 24px;
}
.sc-brand {
  font-size: 13px;
  color: #A89F94;
  letter-spacing: 0.18em;
  margin-bottom: 6px;
}
.sc-url {
  font-size: 10px;
  color: #CBC0AE;
  letter-spacing: 0.12em;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
}
.sc-date {
  margin-top: 24px;
  font-size: 10px;
  color: #CBC0AE;
  letter-spacing: 0.15em;
  font-family: 'Shippori Mincho B1', serif;
}

/* ── Footer ── */
.footer {
  margin-top: 64px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.22em;
  font-weight: 300;
}
.footer-rule { width: 20px; height: 1px; background: var(--paper-dark); }

/* ── Sound toggle ── */
.sound-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 10;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--paper-dark);
  background: var(--card);
  color: var(--ink-mid);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  font-family: 'Shippori Mincho B1', serif;
  line-height: 1;
}
.sound-toggle:hover {
  border-color: var(--lacquer);
  color: var(--lacquer);
  transform: scale(1.08);
}
.sound-toggle.muted {
  opacity: 0.4;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="mark">
      <div class="mark-line"></div>
      <div class="mark-dot"></div>
      <div class="mark-line"></div>
    </div>
    <h1>吃啥嘞</h1>
  </div>

  <div class="result-wrap">
    <div class="result-card" id="result-card">
      <div class="card-fx"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="result-label">今儿个吃这个</div>
      <div class="result-food" id="result">待君问签</div>
      <div class="result-tip" id="result-tip"></div>
      <div class="sign-number" id="sign-number"></div>
    </div>
  </div>

  <div class="fortune-wrap" id="fortune-wrap">
    <div class="fortune-text" id="fortune-text"></div>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="btn" onclick="spin()">
      <span class="btn-label">问问天意</span>
      <span class="btn-rule"></span>
      <span class="btn-kanji">签</span>
    </button>
  </div>

  <div class="share-row" id="share-row">
    <button class="share-btn" onclick="shareFood()">分享这道菜</button>
  </div>

  <div class="divider">
    <span>全部选项</span>
    <input class="add-input" id="add-input" type="text" placeholder="添加…" maxlength="12">
    <button class="add-btn" onclick="addFood()">＋</button>
  </div>

  <div class="foods-grid" id="grid"></div>

  <div class="footer">
    <div class="footer-rule"></div>
    每顿饭都将就不得
    <div class="footer-rule"></div>
  </div>
</div>

<!-- Share overlay -->
<div class="share-overlay" id="share-overlay" onclick="closeShareOverlay(event)">
  <div class="share-preview">
    <img id="share-preview-img" src="" alt="分享图预览">
    <div class="share-hint">长按图片保存 · 分享给朋友</div>
    <button class="share-close" onclick="closeShareOverlay()">关闭</button>
  </div>
</div>

<!-- Hidden share card DOM (for html2canvas rendering) -->
<div class="share-card-wrapper">
  <div class="share-card-hidden" id="share-card">
    <div class="sc-label" id="sc-label">今儿个吃这个</div>
    <div class="sc-food" id="sc-food">胡辣汤</div>
    <div class="sc-fortune" id="sc-fortune">宜热食<br>忌久饿</div>
    <div class="sc-divider"></div>
    <div class="sc-brand">吃啥嘞</div>
    <div class="sc-url">chisha.shameless.top</div>
    <div class="sc-date" id="sc-date"></div>
  </div>
</div>

<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()" title="音效开关">♪</button>

<script>
/* ═══════════════════════════════════════
   State & localStorage
   ═══════════════════════════════════════ */

const STORAGE_KEY = 'chisha-state';
const STATE_VERSION = 1;

const DEFAULT_FOODS = [
  '烩面','胡辣汤','灌汤包','羊肉汤','浆面条',
  '道口烧鸡','鲤鱼焙面','水煎包','炒凉粉','杠子馍',
  '菜馍','油茶','豆腐脑','红焖羊肉','卤面',
  '炸紫酥肉','桶子鸡','烧饼夹肉','焦饼','葱油饼',
  '蒸饺','煎包','板面','扁粉菜','臊子面',
  '信阳焖罐肉','南阳黄牛肉','周口羊肉汤','许昌卤面','新乡烧饼',
  '洛阳水席','开封炒凉粉','逍遥胡辣汤','三鲜烩面','萝卜丝饼'
];

const FOOD_TIPS = {
  '烩面': '汤面一体，趁热吃更香',
  '胡辣汤': '辛辣暖胃，配油条更佳',
  '灌汤包': '汤汁烫口，轻咬慢吸',
  '羊肉汤': '温补暖身，配饼最搭',
  '浆面条': '酸香开胃，发酵易消化',

function defaultState() {
  return {
    version: STATE_VERSION,
    foods: [...DEFAULT_FOODS],
    history: {
      recent: [],
      favorites: [],
      blacklist: [],
      todayFortune: null,
      todayPick: null
    },
    settings: {
      sound: true
    }
  };
}

function migrateState(raw) {
  // v0 → v1: add version, restructure history
  if (!raw.version) {
    raw.version = 1;
    if (Array.isArray(raw.history)) {
      raw.history = { recent: raw.history };
    }
  }
  if (!raw.history) raw.history = {};
  if (!raw.history.recent) raw.history.recent = [];
  if (!raw.history.favorites) raw.history.favorites = [];
  if (!raw.history.blacklist) raw.history.blacklist = [];
  if (!('todayFortune' in raw.history)) raw.history.todayFortune = null;
  if (!('todayPick' in raw.history)) raw.history.todayPick = null;
  if (!raw.settings) raw.settings = { sound: true };
  return raw;
}

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw) return defaultState();
    return migrateState(raw);
  } catch {
    return defaultState();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch { /* quota exceeded — silent */ }
}

const state = loadState();

// Convenience accessors
function getFoods() { return state.foods; }

/* ═══════════════════════════════════════
   Sound System (Web Audio API)
   Audio: Woodblock #268822 (CC0) — kwahmah_02
   Audio: Wax seal #759526 (CC0) — Cerise_Virtuelle
   ═══════════════════════════════════════ */

let audioCtx = null;
let woodblockBuffer = null;
let stampBuffer = null;
let preloadPromise = null;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

// Preload audio files into AudioBuffers
async function loadSoundFile(url) {
  try {
    const ctx = ensureAudioCtx();
    const res = await fetch(url);
    const arrayBuf = await res.arrayBuffer();
    return await ctx.decodeAudioData(arrayBuf);
  } catch {
    return null; // Graceful fallback: silent
  }
}

async function preloadSounds() {
  const ctx = ensureAudioCtx();
  [woodblockBuffer, stampBuffer] = await Promise.all([
    loadSoundFile('sounds/woodblock.wav'),
    loadSoundFile('sounds/stamp.wav')
  ]);
}

function ensurePreload() {
  if (!preloadPromise) {
    preloadPromise = preloadSounds();
  }
  return preloadPromise;
}

// Start preloading as early as possible (decodeAudioData works in suspended state)
ensurePreload();

// Unlock audio context on first user interaction (iOS Safari / WeChat requirement)
function unlockAudio() {
  const ctx = ensureAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true });

/**
 * Play a preloaded AudioBuffer
 */
function playBuffer(buffer) {
  if (!state.settings.sound || !buffer) return;
  const ctx = ensureAudioCtx();
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);
  source.start(0);
}

/** Woodblock tap — start spinning */
function playWoodblock() {
  if (!state.settings.sound) return;
  if (woodblockBuffer) {
    playBuffer(woodblockBuffer);
    return;
  }
  // Buffer not ready yet, wait for preload then play
  ensurePreload().then(() => {
    if (state.settings.sound) playBuffer(woodblockBuffer);
  });
}

/** Wax seal stamp — result landing */
function playStamp() {
  if (!state.settings.sound) return;
  if (stampBuffer) {
    playBuffer(stampBuffer);
    return;
  }
  // Buffer not ready yet, wait for preload then play
  ensurePreload().then(() => {
    if (state.settings.sound) playBuffer(stampBuffer);
  });
}

let current = -1;

function makeTag(name, index) {
  const tag = document.createElement('span');
  tag.className = 'food-tag';
  const label = document.createElement('span');
  label.textContent = name;
  tag.appendChild(label);
  const del = document.createElement('span');
  del.className = 'del-btn';
  del.textContent = '✕';
  del.onclick = e => { e.stopPropagation(); removeFood(index); };
  tag.appendChild(del);
  tag.onclick = () => pick(index);
  return tag;
}

function renderTags() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  getFoods().forEach((f, i) => grid.appendChild(makeTag(f, i)));
  if (current !== -1 && current < getFoods().length)
    grid.querySelectorAll('.food-tag')[current].classList.add('active');
}

function pick(index) {
  const el = document.getElementById('result');
  const tipEl = document.getElementById('result-tip');
  const tags = document.querySelectorAll('.food-tag');
  if (current !== -1 && tags[current]) tags[current].classList.remove('active');
  current = index;
  tags[current].classList.add('active');
  tags[current].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  el.classList.remove('landing');
  void el.offsetWidth;
  el.classList.add('landing');
  el.textContent = getFoods()[index];
  const foodName = getFoods()[index];
  tipEl.innerHTML = '<span class="tip-main">' + (FOOD_TIPS[foodName] || '') + '</span>' +
    '<span class="tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
  tipEl.classList.add('visible');
  showSignNumber();
  showShareRow();
}

function removeFood(index) {
  const foods = getFoods();
  if (foods.length <= 1) return;
  foods.splice(index, 1);
  if (current === index) {
    current = -1;
    const el = document.getElementById('result');
    const tipEl = document.getElementById('result-tip');
    el.classList.remove('landing');
    el.textContent = '待君问签';
    tipEl.classList.remove('visible');
    tipEl.textContent = '';
    hideSignNumber();
  } else if (current > index) current--;
  renderTags();
  saveState();
}

function addFood() {
  const input = document.getElementById('add-input');
  const val = input.value.trim();
  const foods = getFoods();
  if (!val || foods.includes(val)) {
    input.value = '';
    input.style.borderColor = 'var(--lacquer)';
    setTimeout(() => { input.style.borderColor = ''; }, 400);
    return;
  }
  foods.push(val);
  input.value = '';
  renderTags();
  saveState();
  const tags = document.querySelectorAll('.food-tag');
  const newTag = tags[tags.length - 1];
  newTag.classList.add('new-pop');
  newTag.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFood();
});

/* ═══════════════════════════════════════
   Spin Logic
   ═══════════════════════════════════════ */

let spinInterval = null;
let isSpinning = false;
let lastShown = 0;

function setSpinState(on) {
  isSpinning = on;
  const btn = document.getElementById('btn');
  const card = document.getElementById('result-card');
  const label = btn.querySelector('.btn-label');
  const kanji = btn.querySelector('.btn-kanji');
  if (on) {
    btn.classList.add('is-spinning');
    card.classList.add('spinning');
    label.textContent = '就这个了';
    kanji.textContent = '止';
  } else {
    btn.classList.remove('is-spinning');
    card.classList.remove('spinning');
    label.textContent = '问问天意';
    kanji.textContent = '签';
  }
}

function addToRecent(foodName) {
  const recent = state.history.recent;
  // Avoid consecutive duplicates
  if (recent.length > 0 && recent[0].name === foodName) return;
  recent.unshift({ name: foodName, date: new Date().toISOString().slice(0, 10) });
  // FIFO cap at 30
  if (recent.length > 30) recent.length = 30;
}

function stopSpin() {
  if (!spinInterval) return;
  clearTimeout(spinInterval);
  spinInterval = null;
  setSpinState(false);
  playStamp();
  pick(lastShown);
  addToRecent(getFoods()[lastShown]);
  saveState();
}

function spin() {
  if (isSpinning) { stopSpin(); return; }

  const foods = getFoods();
  const el = document.getElementById('result');
  let rounds = 0;
  const total = 20 + Math.floor(Math.random() * 10);

  el.classList.remove('landing');
  document.getElementById('result-tip').classList.remove('visible');
  setSpinState(true);
  playWoodblock();

  // Slow down over time
  function nextTick() {
    lastShown = Math.floor(Math.random() * foods.length);
    el.textContent = foods[lastShown];
    rounds++;

    if (rounds >= total) {
      spinInterval = null;
      setSpinState(false);
      playStamp();
      pick(lastShown);
      addToRecent(foods[lastShown]);
      saveState();
      return;
    }

    // Speed: starts fast (50ms), decelerates from round 12 onward
    const delay = rounds < 12
      ? 50
      : 50 + (rounds - 12) * 18;
    spinInterval = setTimeout(nextTick, delay);
  }

  spinInterval = setTimeout(nextTick, 50);
}

function hashCode(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash;
}

function getTip(foodName) {
  const food = FOOD_TIPS[foodName] || '';
  const time = getTimeTip();
  const solar = getSolarTip();
  const parts = [food, time, solar].filter(Boolean);
  return parts.join(' · ');
}

function getDailyFortune() {
  const today = new Date().toISOString().slice(0, 10);

  // 精确的节气日 → 显示对应节气签（横排）
  if (isSolarTermDay()) {
    const term = getCurrentSolarTerm();
    const solar = FORTUNES.find(f => f.type === 'solar' && f.text.startsWith(term));
    if (solar) return solar;
  }

  // 非节气日 → 从食签中按日期 hash 选取（竖排宜/忌）
  const foods = FORTUNES.filter(f => f.type === 'food');
  const seed = Math.abs(hashCode(today));
  return foods[seed % foods.length];
}

function toChineseUpper(n) {
  const cn = ['零','壹','贰','叁','肆','伍','陆','柒','捌','玖','拾'];
  if (n <= 10) return cn[n];
  if (n < 20) return '拾' + (n % 10 === 0 ? '' : cn[n % 10]);
  const tens = Math.floor(n / 10);
  const ones = n % 10;
  if (ones === 0) return cn[tens] + '拾';
  return cn[tens] + '拾' + cn[ones];
}

function getSignNumber() {
  const today = new Date().toISOString().slice(0, 10);
  const seed = Math.abs(hashCode(today));
  return (seed % FORTUNES.length) + 1;
}

function renderSignNumber() {
  const el = document.getElementById('sign-number');
  const num = getSignNumber();
  el.textContent = '第' + toChineseUpper(num) + '签';
}

function renderFortune() {
  const fortune = getDailyFortune();
  const el = document.getElementById('fortune-text');
  if (fortune.type === 'food') {
    // 竖排：忌在左，宜在右，从右到左读
    el.innerHTML = '<div class="fortune-columns"><div class="fc-col">' + fortune.ji + '</div><div class="fc-col">' + fortune.yi + '</div></div>';
  } else {
    el.innerHTML = '';
    el.textContent = fortune.text;
  }
}

function showFortune() {
  document.getElementById('fortune-wrap').classList.add('visible');
}

function showSignNumber() {
  document.getElementById('sign-number').classList.add('visible');
}

function hideSignNumber() {
  document.getElementById('sign-number').classList.remove('visible');
}

function showShareRow() {

}

   ═══════════════════════════════════════ */

function prepareShareCard(type) {
  const card = document.getElementById('share-card');
  const label = document.getElementById('sc-label');
  const food = document.getElementById('sc-food');
  const fortune = document.getElementById('sc-fortune');
  const dateEl = document.getElementById('sc-date');

  // Date stamp: 2026.05.01
  const d = new Date();
  dateEl.textContent = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');

  const resultText = document.getElementById('result').textContent;
  label.textContent = '今儿个吃这个';
  food.textContent = resultText;
  const foodTip = FOOD_TIPS[resultText] || '';
  fortune.innerHTML = foodTip +
    '<span class="sc-tip-sub">' + getTimeTip() + ' · ' + getSolarTip() + '</span>';
}

async function generateShareImage(type) {
  if (typeof html2canvas === 'undefined') {
    alert('分享功能加载中，请稍后再试');
    return;
  }
  prepareShareCard(type);
  const card = document.getElementById('share-card');

  try {
    const canvas = await html2canvas(card, {
      backgroundColor: '#F6F1E9',
      scale: 2,
      useCORS: true,
      logging: false
    });
    const dataUrl = canvas.toDataURL('image/png');
    showShareOverlay(dataUrl);
  } catch(e) {
    console.error('Share image generation failed:', e);
  }
}

function showShareOverlay(imgSrc) {
  const overlay = document.getElementById('share-overlay');
  const img = document.getElementById('share-preview-img');
  img.src = imgSrc;
  overlay.classList.add('active');
}

function closeShareOverlay(e) {
  if (e && e.target !== document.getElementById('share-overlay') && !e.target.closest('.share-close')) return;
  document.getElementById('share-overlay').classList.remove('active');
}

function shareFood() {
  const resultText = document.getElementById('result').textContent;
  if (resultText === '待君问签') return;
  generateShareImage('food');
}
