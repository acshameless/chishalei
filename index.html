<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃啥嘞</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper:       #F6F1E9;
  --paper-dark:  #E8DFD0;
  --card:        #FDFAF5;
  --ink:         #23201B;
  --ink-mid:     #6B6055;
  --ink-light:   #A89F94;
  --lacquer:     #B85438;
  --lacquer-lt:  #E8C4AE;
  --lacquer-dim: #8A3D27;
}

html { min-height: 100vh; background: var(--paper); color: var(--ink); }

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 24px 96px;
  position: relative;
  overflow-x: hidden;
  background-image: radial-gradient(circle, #CBC0AE 1px, transparent 1px);
  background-size: 28px 28px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 38%, rgba(246,241,233,0.65) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 52px; }

.mark {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}
.mark-line { width: 32px; height: 1px; background: var(--lacquer); opacity: 0.65; }
.mark-dot  { width: 6px; height: 6px; border: 1.5px solid var(--lacquer); border-radius: 50%; opacity: 0.75; }

h1 {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 800;
  color: var(--ink);
  letter-spacing: 0.14em;
  line-height: 1;
}

/* ── Result card ── */
.result-wrap { width: 100%; margin-bottom: 32px; }

.result-card {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  position: relative;
  padding: 40px 32px 36px;
  text-align: center;
}

.result-card::before, .result-card::after,
.corner-tr, .corner-bl {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--lacquer);
  border-style: solid;
  opacity: 0.5;
}
.result-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.result-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

.result-label {
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.3em;
  margin-bottom: 20px;
  font-weight: 300;
}

.result-food {
  font-family: 'Shippori Mincho B1', serif;
  font-size: clamp(2.6rem, 9vw, 4.4rem);
  font-weight: 600;
  color: var(--lacquer-dim);
  letter-spacing: 0.1em;
  min-height: 1.4em;
  display: flex;
  align-items: center;
  justify-content: center;
}

.result-card.spinning .result-food {
  animation: text-flicker 0.14s steps(1) infinite;
}

@keyframes text-flicker {
  0%   { color: var(--lacquer-dim); }
  40%  { color: var(--ink-mid); }
  70%  { color: var(--lacquer); }
  100% { color: var(--lacquer-dim); }
}

/* Scan-line sweep */
.result-card { overflow: hidden; }

.card-fx {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.result-card.spinning .card-fx::after {
  content: '';
  position: absolute;
  left: -10%; right: -10%;
  height: 45%;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(184,84,56,0.07) 40%,
    rgba(184,84,56,0.11) 50%,
    rgba(184,84,56,0.07) 60%,
    transparent 100%
  );
  animation: scan-sweep 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes scan-sweep {
  0%   { top: -50%; }
  100% { top: 130%; }
}

/* Corner brackets pulse while spinning */
@keyframes corner-pulse {
  0%   { opacity: 0.3; width: 13px; height: 13px; }
  100% { opacity: 1;   width: 22px; height: 22px; }
}

.result-card.spinning::before { animation: corner-pulse 0.4s ease-in-out infinite alternate; }
.result-card.spinning::after  { animation: corner-pulse 0.4s 0.1s ease-in-out infinite alternate; }
.result-card.spinning .corner-tr { animation: corner-pulse 0.4s 0.05s ease-in-out infinite alternate; }
.result-card.spinning .corner-bl { animation: corner-pulse 0.4s 0.15s ease-in-out infinite alternate; }

/* Border tint while spinning */
.result-card.spinning { border-color: var(--lacquer-lt); }

.result-food.landing {
  animation: stamp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes stamp {
  0%   { transform: scale(1.1); opacity: 0; filter: blur(3px); }
  55%  { filter: blur(0); }
  100% { transform: scale(1);   opacity: 1; }
}

/* ── Button ── */
.btn-wrap { margin-bottom: 60px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--lacquer);
  color: #FDF8F2;
  border: none;
  padding: 14px 44px;
  font-size: 15px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 400;
  letter-spacing: 0.18em;
  cursor: pointer;
  box-shadow: 3px 3px 0 rgba(139,61,39,0.22);
  transition: background 0.2s, transform 0.12s, box-shadow 0.12s;
}

.btn:hover  { background: var(--lacquer-dim); transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(139,61,39,0.22); }
.btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 rgba(139,61,39,0.18); }

/* Stop state */
.btn.is-spinning {
  background: var(--ink);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.18);
  letter-spacing: 0.22em;
  animation: btn-pulse 0.7s ease-in-out infinite alternate;
}
.btn.is-spinning:hover { background: #3a352e; transform: translate(-1px,-1px); box-shadow: 5px 5px 0 rgba(0,0,0,0.18); }

@keyframes btn-pulse {
  0%   { box-shadow: 3px 3px 0 rgba(0,0,0,0.18); }
  100% { box-shadow: 3px 3px 0 rgba(0,0,0,0.18), 0 0 0 4px rgba(35,32,27,0.08); }
}

.btn-rule { width: 1px; height: 14px; background: rgba(255,255,255,0.35); }

.btn-kanji {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 400;
  opacity: 0.88;
  display: inline-block;
  transition: transform 0.55s ease;
}
.btn:not(.is-spinning):hover .btn-kanji { transform: rotate(90deg); }
.btn.is-spinning .btn-kanji { animation: kanji-spin 0.6s linear infinite; }

@keyframes kanji-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Divider ── */
.divider {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  color: var(--ink-light);
  font-size: 11px;
  letter-spacing: 0.22em;
  font-weight: 300;
}
.divider::before { content: ''; flex: 0 0 24px; height: 1px; background: var(--paper-dark); }
.divider::after  { content: ''; flex: 1;        height: 1px; background: var(--paper-dark); }
.divider > span  { white-space: nowrap; }

.add-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--paper-dark);
  padding: 2px 6px 2px 4px;
  font-size: 12px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 300;
  color: var(--ink);
  outline: none;
  width: 96px;
  letter-spacing: 0.06em;
  transition: border-color 0.2s;
}
.add-input::placeholder { color: var(--ink-light); }
.add-input:focus { border-color: var(--lacquer); }

.add-btn {
  background: none;
  border: 1px solid var(--paper-dark);
  padding: 2px 10px;
  font-size: 15px;
  color: var(--ink-mid);
  cursor: pointer;
  line-height: 1.5;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn:hover { border-color: var(--lacquer); color: var(--lacquer); }

/* ── Food tags ── */
.foods-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  width: 100%;
}

.food-tag {
  background: var(--card);
  border: 1px solid var(--paper-dark);
  padding: 6px 15px;
  font-size: 13.5px;
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.16s ease;
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 400;
  letter-spacing: 0.05em;
  user-select: none;
  display: inline-flex;
  align-items: center;
}

.food-tag:hover { background: var(--lacquer-lt); border-color: var(--lacquer-lt); color: var(--lacquer-dim); }
.food-tag.active { background: var(--lacquer); border-color: var(--lacquer); color: #FDF8F2; }

.food-tag.new-pop { animation: stamp 0.38s cubic-bezier(0.22,1,0.36,1); }

.del-btn {
  margin-left: 7px;
  font-size: 10px;
  color: inherit;
  opacity: 0;
  transition: opacity 0.15s;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
}
.food-tag:hover .del-btn { opacity: 0.45; }
.del-btn:hover { opacity: 1 !important; }

/* ── Footer ── */
.footer {
  margin-top: 64px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 0.22em;
  font-weight: 300;
}
.footer-rule { width: 20px; height: 1px; background: var(--paper-dark); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="mark">
      <div class="mark-line"></div>
      <div class="mark-dot"></div>
      <div class="mark-line"></div>
    </div>
    <h1>吃啥嘞</h1>
  </div>

  <div class="result-wrap">
    <div class="result-card" id="result-card">
      <div class="card-fx"></div>
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="result-label">今儿个吃这个</div>
      <div class="result-food" id="result">戳下边按钮</div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="btn" onclick="spin()">
      <span class="btn-label">问问天意</span>
      <span class="btn-rule"></span>
      <span class="btn-kanji">签</span>
    </button>
  </div>

  <div class="divider">
    <span>全部选项</span>
    <input class="add-input" id="add-input" type="text" placeholder="添加…" maxlength="12">
    <button class="add-btn" onclick="addFood()">＋</button>
  </div>

  <div class="foods-grid" id="grid"></div>

  <div class="footer">
    <div class="footer-rule"></div>
    每顿饭都将就不得
    <div class="footer-rule"></div>
  </div>
</div>

<script>
const foods = [
  '烩面','胡辣汤','灌汤包','羊肉汤','浆面条',
  '道口烧鸡','鲤鱼焙面','水煎包','炒凉粉','杠子馍',
  '菜馍','油茶','豆腐脑','红焖羊肉','卤面',
  '炸紫酥肉','桶子鸡','烧饼夹肉','焦饼','葱油饼',
  '蒸饺','煎包','板面','扁粉菜','臊子面',
  '信阳焖罐肉','南阳黄牛肉','周口羊肉汤','许昌卤面','新乡烧饼',
  '洛阳水席','开封炒凉粉','逍遥胡辣汤','三鲜烩面','萝卜丝饼'
];

let current = -1;

function makeTag(name, index) {
  const tag = document.createElement('span');
  tag.className = 'food-tag';
  const label = document.createElement('span');
  label.textContent = name;
  tag.appendChild(label);
  const del = document.createElement('span');
  del.className = 'del-btn';
  del.textContent = '✕';
  del.onclick = e => { e.stopPropagation(); removeFood(index); };
  tag.appendChild(del);
  tag.onclick = () => pick(index);
  return tag;
}

function renderTags() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  foods.forEach((f, i) => grid.appendChild(makeTag(f, i)));
  if (current !== -1 && current < foods.length)
    grid.querySelectorAll('.food-tag')[current].classList.add('active');
}

function pick(index) {
  const el = document.getElementById('result');
  const tags = document.querySelectorAll('.food-tag');
  if (current !== -1 && tags[current]) tags[current].classList.remove('active');
  current = index;
  tags[current].classList.add('active');
  tags[current].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  el.classList.remove('landing');
  void el.offsetWidth;
  el.classList.add('landing');
  el.textContent = foods[index];
}

function removeFood(index) {
  if (foods.length <= 1) return;
  foods.splice(index, 1);
  if (current === index) {
    current = -1;
    const el = document.getElementById('result');
    el.classList.remove('landing');
    el.textContent = '戳下边按钮';
  } else if (current > index) current--;
  renderTags();
}

function addFood() {
  const input = document.getElementById('add-input');
  const val = input.value.trim();
  if (!val || foods.includes(val)) { input.value = ''; return; }
  foods.push(val);
  input.value = '';
  renderTags();
  const tags = document.querySelectorAll('.food-tag');
  const newTag = tags[tags.length - 1];
  newTag.classList.add('new-pop');
  newTag.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('add-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFood();
});

let spinInterval = null;
let isSpinning = false;
let lastShown = 0;

function setSpinState(on) {
  isSpinning = on;
  const btn = document.getElementById('btn');
  const card = document.getElementById('result-card');
  const label = btn.querySelector('.btn-label');
  const kanji = btn.querySelector('.btn-kanji');
  if (on) {
    btn.classList.add('is-spinning');
    card.classList.add('spinning');
    label.textContent = '就这个了';
    kanji.textContent = '止';
  } else {
    btn.classList.remove('is-spinning');
    card.classList.remove('spinning');
    label.textContent = '问问天意';
    kanji.textContent = '签';
  }
}

function stopSpin() {
  if (!spinInterval) return;
  clearInterval(spinInterval);
  spinInterval = null;
  setSpinState(false);
  pick(lastShown);
}

function spin() {
  if (isSpinning) { stopSpin(); return; }

  const el = document.getElementById('result');
  let rounds = 0;
  const total = 20 + Math.floor(Math.random() * 10);

  el.classList.remove('landing');
  setSpinState(true);

  // Slow down over time
  function nextTick() {
    lastShown = Math.floor(Math.random() * foods.length);
    el.textContent = foods[lastShown];
    rounds++;

    if (rounds >= total) {
      spinInterval = null;
      setSpinState(false);
      pick(lastShown);
      return;
    }

    // Speed: starts fast (50ms), decelerates from round 12 onward
    const delay = rounds < 12
      ? 50
      : 50 + (rounds - 12) * 18;
    spinInterval = setTimeout(nextTick, delay);
  }

  spinInterval = setTimeout(nextTick, 50);
}

renderTags();
</script>
</body>
</html>
